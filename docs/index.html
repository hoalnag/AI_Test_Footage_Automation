<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Test Footage — Preview</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1100px; margin: 3rem auto; padding: 0 1.5rem; color: #111; }
    h1 { margin-bottom: 0.25rem; }
    p.note { color: #888; font-size: 0.875rem; margin-top: 0; }
    #test-footage-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 2rem; }
    #test-footage-gallery a { display: block; margin-top: 8px; font-size: 14px; color: inherit; text-decoration: none; }
    #test-footage-gallery a:hover { text-decoration: underline; }
    #empty { color: #888; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>AI Test Footage</h1>
  <p class="note">Local preview of the gallery feed. This is what the Cargo embed renders.</p>
  <div id="test-footage-gallery"></div>
  <p id="empty" hidden>No videos yet — run <code>npm run watch</code> and drop a video into <code>incoming/</code>.</p>

  <script>
    function escapeHtml(str) {
      var div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    fetch("./videos.json")
      .then(function (res) { return res.json(); })
      .then(function (videos) {
        var el = document.getElementById("test-footage-gallery");
        if (!videos.length) {
          document.getElementById("empty").hidden = false;
          return;
        }
        videos.forEach(function (v) {
          var card = document.createElement("div");
          card.innerHTML =
            '<div style="aspect-ratio:16/9;">' +
              '<iframe src="https://player.vimeo.com/video/' + encodeURIComponent(v.vimeoId) + '" ' +
              'style="width:100%;height:100%;border:0;" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe>' +
            '</div>' +
            '<a href="./prompts/' + encodeURIComponent(v.slug) + '.html">' + escapeHtml(v.caption) + '</a>';
          el.appendChild(card);
        });
      })
      .catch(function (err) {
        console.error("Failed to load gallery:", err);
      });
  </script>
</body>
</html>
